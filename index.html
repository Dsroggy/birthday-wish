<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DSR Download Hub</title>

<!-- Website Logo (Browser Tab Icon) -->

<link rel="icon" type="image/png" href="icons/logo.png">

<style>

body{
font-family:Segoe UI;
background:#0f172a;
color:white;
margin:0;
}

/* HEADER */

header{
background:#1e293b;
padding:10px 20px;
display:flex;
align-items:center;
gap:12px;
font-size:24px;
font-weight:bold;
}

/* HEADER LOGO */

.logo{
width:45px;
height:45px;
border-radius:50%;
object-fit:cover;
}

/* GRID */

.container{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.4);
text-align:center;
}

/* APP ICON */

.app-icon{
width:80px;
height:80px;
border-radius:50%;
object-fit:cover;
margin-bottom:10px;
border:3px solid #22c55e;
}

.card h3{
margin:10px 0;
}

.download-btn{
display:inline-block;
margin-top:10px;
padding:10px 20px;
background:#22c55e;
color:white;
text-decoration:none;
border-radius:6px;
font-weight:bold;
}

.download-btn:hover{
background:#16a34a;
}

footer{
text-align:center;
padding:15px;
background:#1e293b;
margin-top:20px;
}

</style>

</head>

<body>

<header>

<img src="icons/logo.png" class="logo">

<span>DSR Download Hub</span>

</header>

<div class="container">

<div class="card">
<img src="icons/dsr.png" class="app-icon">
<h3>Dsr Ultimate Control</h3>
<p>Android Application</p>
<a class="download-btn" href="files/Dsr Ultimate.apk" download>Download</a>
</div>

<div class="card">
<img src="icons/pdf.png" class="app-icon">
<h3>PDF Document</h3>
<p>Important Notes</p>
<a class="download-btn" href="files/notes.pdf" download>Download</a>
</div>

<div class="card">
<img src="icons/zip.png" class="app-icon">
<h3>ZIP File</h3>
<p>Project Source Code</p>
<a class="download-btn" href="files/project.zip" download>Download</a>
</div>

</div>

<footer>
© 2026 DSR Hub
</footer>

</body>
</html>
